run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - revive
    - gofmt
    - goimports
    - misspell
    - unconvert
    - prealloc
    - copyloopvar
    - gocritic

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: var-naming
      - name: range
      - name: unreachable-code
      - name: errorf
      - name: unnecessary-stmt
  gocritic:
    enabled-tags:
      - diagnostic
    disabled-checks:
      - commentFormatting
      - valSwap
  errcheck:
    exclude-functions:
      - (net/http.ResponseWriter).Write

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - linters:
        - errcheck
      source: "defer .+Close"
    - linters:
        - errcheck
      source: "\\.Write\\("
    - linters:
        - errcheck
      source: "ListenAndServe"
    - linters:
        - errcheck
      source: "\\.Seek\\("
    - linters:
        - errcheck
      source: "\\.Sync\\("
    - linters:
        - errcheck
      source: "\\.Read\\("
    - linters:
        - errcheck
      source: "\\.Encode\\("